<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS APEX — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;background:#02030a;color:#eef0f8;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Background grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}

/* Glow orbs */
body::after{
  content:'';position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,255,136,0.06) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.container{
  width:100%;max-width:420px;padding:20px;
  position:relative;z-index:1;
}

/* Logo */
.logo{text-align:center;margin-bottom:40px}
.logo-mark{
  width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,#00c853,#00e5ff);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  box-shadow:0 0 32px rgba(0,255,136,0.5),0 0 64px rgba(0,229,255,0.2);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 32px rgba(0,255,136,0.5),0 0 64px rgba(0,229,255,0.2)}50%{box-shadow:0 0 48px rgba(0,255,136,0.8),0 0 96px rgba(0,229,255,0.3)}}
.logo-mark svg{width:24px;height:24px;fill:#02030a}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:4px;color:white}
.logo-name span{color:#00ff88}
.logo-sub{font-size:9px;letter-spacing:3px;color:#3d4659;margin-top:4px}

/* Card */
.card{
  background:rgba(4,6,14,0.95);
  border:1px solid rgba(0,255,136,0.15);
  border-radius:12px;padding:32px;
  box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 40px rgba(0,255,136,0.02);
}

/* Tabs */
.tabs{display:flex;margin-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.05)}
.tab{
  flex:1;padding:10px;text-align:center;font-size:11px;font-weight:600;
  letter-spacing:2px;color:#3d4659;cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:all .2s;font-family:'JetBrains Mono',monospace;
}
.tab.on{color:#00ff88;border-bottom-color:#00ff88}

/* Form */
.field{margin-bottom:16px}
.field label{display:block;font-size:8px;letter-spacing:2px;color:#3d4659;text-transform:uppercase;margin-bottom:6px}
.field input{
  width:100%;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);border-radius:6px;
  padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;
  color:white;outline:none;transition:all .2s;
}
.field input:focus{border-color:#00ff88;box-shadow:0 0 0 2px rgba(0,255,136,0.1),0 0 16px rgba(0,255,136,0.05)}
.field input::placeholder{color:#3d4659}

/* Button */
.btn{
  width:100%;padding:14px;margin-top:8px;
  background:linear-gradient(135deg,#00c853,#00ff88);
  border:none;border-radius:7px;color:#02030a;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:3px;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 24px rgba(0,255,136,0.4);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(0,255,136,0.6)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* Error/Success */
.msg{padding:10px 14px;border-radius:6px;font-size:10px;letter-spacing:0.5px;margin-bottom:14px;display:none}
.msg.error{background:rgba(255,0,85,0.08);border:1px solid rgba(255,0,85,0.3);color:#ff0055}
.msg.success{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);color:#00ff88}

/* Plans */
.plans{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.plan{
  padding:14px;border-radius:7px;text-align:center;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);
  transition:all .2s;
}
.plan.selected{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.06)}
.plan-name{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.plan-price{font-size:18px;font-weight:800;font-family:'Syne',sans-serif}
.plan-desc{font-size:8px;color:#3d4659;margin-top:4px}
.plan.free .plan-name{color:#7a85a0}
.plan.premium .plan-name{color:#00ff88}
.plan.premium .plan-price{color:#00ff88}

/* Footer */
.footer{text-align:center;margin-top:20px;font-size:9px;color:#3d4659;letter-spacing:0.5px}
.footer a{color:#00ff88;text-decoration:none}

.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05)}
.divider span{font-size:9px;color:#3d4659;letter-spacing:1px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4L22 6.92M22 6.92V13M22 6.92H16"/></svg>
    </div>
    <div class="logo-name">NEXUS <span>APEX</span></div>
    <div class="logo-sub">PROFESSIONAL TRADING INTELLIGENCE</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab on" onclick="showTab('login',this)">INICIAR SESIÓN</button>
      <button class="tab" onclick="showTab('register',this)">REGISTRARSE</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field">
        <label>Usuario o Email</label>
        <input type="text" id="loginUser" placeholder="tu_usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">▶ ENTRAR AL DASHBOARD</button>
      <div class="divider"><span>O</span></div>
      <div style="text-align:center;font-size:9px;color:#3d4659">
        ¿No tienes cuenta? <a href="#" onclick="showTab('register',document.querySelectorAll('.tab')[1])" style="color:#00ff88">Regístrate gratis</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="plans">
        <div class="plan free selected" id="plan-free" onclick="selectPlan('free')">
          <div class="plan-name">FREE</div>
          <div class="plan-price">£0</div>
          <div class="plan-desc">3 pares · señales básicas</div>
        </div>
        <div class="plan premium" id="plan-premium" onclick="selectPlan('premium')">
          <div class="plan-name">PREMIUM</div>
          <div class="plan-price" style="color:#00ff88">£15<span style="font-size:10px;font-weight:400">/mes</span></div>
          <div class="plan-desc">Todo ilimitado · IA · alertas</div>
        </div>
      </div>
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="regUser" placeholder="tu_usuario" autocomplete="username">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="regPass" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn" id="regBtn" onclick="doRegister()">▶ CREAR CUENTA</button>
    </div>
  </div>

  <div class="footer">
    Al registrarte aceptas los <a href="#">Términos de Servicio</a><br>
    NEXUS APEX © 2024 — Professional Trading Intelligence
  </div>
</div>

<script>
const API = window.location.origin;
let selectedPlan = 'free';

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  hideMsg();
}

function selectPlan(plan) {
  selectedPlan = plan;
  document.getElementById('plan-free').classList.toggle('selected', plan === 'free');
  document.getElementById('plan-premium').classList.toggle('selected', plan === 'premium');
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function hideMsg() { document.getElementById('msg').style.display = 'none'; }

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) { showMsg('Completa todos los campos', 'error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '⏳ VERIFICANDO...';
  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('nexus_token', d.token);
      localStorage.setItem('nexus_user', JSON.stringify(d.user));
      showMsg('✅ ¡Bienvenido ' + d.user.username + '!', 'success');
      setTimeout(() => window.location.href = '/', 1000);
    } else {
      showMsg(d.error || 'Error al iniciar sesión', 'error');
      btn.disabled = false; btn.textContent = '▶ ENTRAR AL DASHBOARD';
    }
  } catch(e) {
    showMsg('Error de conexión', 'error');
    btn.disabled = false; btn.textContent = '▶ ENTRAR AL DASHBOARD';
  }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  if (!username || !email || !password) { showMsg('Completa todos los campos', 'error'); return; }
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '⏳ CREANDO CUENTA...';
  try {
    const r = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, email, password, plan: selectedPlan})
    });
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('nexus_token', d.token);
      localStorage.setItem('nexus_user', JSON.stringify(d.user));
      showMsg('✅ ' + d.message, 'success');
      setTimeout(() => window.location.href = '/', 1200);
    } else {
      showMsg(d.error || 'Error al registrarse', 'error');
      btn.disabled = false; btn.textContent = '▶ CREAR CUENTA';
    }
  } catch(e) {
    showMsg('Error de conexión', 'error');
    btn.disabled = false; btn.textContent = '▶ CREAR CUENTA';
  }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('tab-login').style.display !== 'none') doLogin();
    else doRegister();
  }
});

// Si ya hay token, ir directo al dashboard
if (localStorage.getItem('nexus_token')) {
  window.location.href = '/';
}
</script>
</body>
</html>
